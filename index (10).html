<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="utf-8"/>
<title>Golden Zone - Full History</title>
<style>
    body { background: #000; color: #fff; font-family: sans-serif; padding: 10px; text-align: center; }
    .main-box { border: 2px solid #ffd700; padding: 15px; border-radius: 12px; background: #0a0a0a; }
    #signal { font-size: 35px; font-weight: 900; color: #ffd700; margin: 10px 0; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 11px; }
    th, td { border: 1px solid #333; padding: 6px; text-align: center; }
    .w { color: #52c41a; font-weight: bold; }
    .l { color: #ff4d4f; font-weight: bold; }
    .BIG { color: #ff4d4f; } .SMALL { color: #1a73e8; }
</style>
</head>
<body>

<div class="main-box">
    <h2>GOLDEN ZONE ENGINE</h2>
    <div id="signal">WAITING...</div>
    <div id="filterCount">0/10 Filters Passed</div>
</div>

<table id="logTable">
    <thead><tr><th>Period</th><th>Pred</th><th>Result</th><th>Status</th></tr></thead>
    <tbody id="logBody"></tbody>
</table>

<script>
(async function(){
    const API = 'https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json';
    let lastPeriod = null;
    let lastPred = null;

    async function tick(){
        try {
            const res = await fetch(API + '?t=' + Date.now());
            const j = await res.json();
            const list = j.data.list;
            const n = list.map(i => parseInt(i.number));
            const period = list[0].issueNumber;

            let filters = [ (n[0]%2===0), (n[0]>=5), (n[0]>n[1]), (n[1]>n[2]), ((n[0]+n[1])<10), (n.slice(0,5).reduce((a,b)=>a+b,0)/5>4), (n[0]!==n[1]), (n[1]%2!==0), (n[0]<9), (n[0]>0) ];
            let passed = filters.filter(v => v === true).length;
            let currentPred = (filters[1] ? "BIG" : "SMALL");

            // Win/Loss Logging
            if(lastPeriod !== null && period !== lastPeriod) {
                let actual = (n[0] >= 5 ? "BIG" : "SMALL");
                let status = (lastPred === actual) ? "WIN" : "LOSS";
                let tbody = document.getElementById('logBody');
                let row = tbody.insertRow(0);
                row.innerHTML = `<td>${lastPeriod.slice(-3)}</td><td class="${lastPred}">${lastPred}</td><td>${actual}</td><td class="${status==='WIN'?'w':'l'}">${status}</td>`;
                
                // 100 rows ka limit check
                if(tbody.rows.length > 100) {
                    tbody.deleteRow(100);
                }
            }

            // Signal Display
            if(passed >= 6) {
                document.getElementById('signal').innerText = currentPred;
                document.getElementById('signal').className = currentPred;
                document.getElementById('signal').style.color = (currentPred === 'BIG' ? '#ff4d4f' : '#1a73e8');
                lastPred = currentPred;
            } else {
                document.getElementById('signal').innerText = "NO TRADE";
                document.getElementById('signal').style.color = "#ff4d4f";
            }
            
            document.getElementById('filterCount').innerText = `${passed}/10 Filters Passed`;
            lastPeriod = period;
        } catch(e){}
    }
    setInterval(tick, 2000);
    tick();
})();
</script>
</body>
</html>
